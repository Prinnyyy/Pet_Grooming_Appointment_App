# Project-level Codex configuration.
# Keep this conservative. Change only with explicit user approval.

model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
writable_roots = ["."]
network_access = false

[agents]
# Lightweight subagent team.
# Keep parallelism limited to avoid token waste and unstable coordination.
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1200

